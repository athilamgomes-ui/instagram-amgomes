<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram — A.M. Gomes Social Analytics</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card2: #222634;
  --text: #e8eaf0;
  --muted: #9aa0b0;
  --accent: #e1306c;
  --accent2: #f77737;
  --green: #2ecc71;
  --yellow: #f1c40f;
  --red: #e74c3c;
  --blue: #3498db;
  --border: #2c3040;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding-bottom: 60px; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }

header { background: linear-gradient(135deg, #833ab4, #e1306c, #f77737); padding: 24px 0 18px; margin-bottom: 20px; }
header h1 { font-size: 1.5rem; font-weight: 800; }
header .sub { font-size: .85rem; opacity: .9; margin-top: 4px; }
.selo { display: inline-block; background: rgba(0,0,0,.3); border-radius: 20px; padding: 4px 14px; font-size: .78rem; margin-top: 10px; }

.tabs { display: flex; gap: 8px; margin: 0 0 20px; flex-wrap: wrap; }
.tab { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 10px; cursor: pointer; font-size: .9rem; font-weight: 600; }
.tab.ativa { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab.off { opacity: .45; }
.tab.off::after { content: " 🔌"; font-size: .75rem; }

.alertas { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.alerta { border-radius: 10px; padding: 12px 16px; font-size: .9rem; font-weight: 500; }
.alerta.vermelho { background: rgba(231,76,60,.15); border: 1px solid rgba(231,76,60,.4); }
.alerta.amarelo { background: rgba(241,196,15,.12); border: 1px solid rgba(241,196,15,.35); }
.alerta.verde { background: rgba(46,204,113,.12); border: 1px solid rgba(46,204,113,.35); }

.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.kpi { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
.kpi .valor { font-size: 1.7rem; font-weight: 800; }
.kpi .rotulo { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.kpi .delta { font-size: .78rem; margin-top: 4px; font-weight: 600; }
.delta.pos { color: var(--green); } .delta.neg { color: var(--red); } .delta.neutro { color: var(--muted); }

section { margin-bottom: 28px; }
h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
h3.sub { font-size: .9rem; margin-bottom: 10px; color: var(--muted); font-weight: 600; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }

.metas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
.meta-item { background: var(--card2); border-radius: 10px; padding: 14px; }
.meta-item .titulo { font-size: .82rem; color: var(--muted); margin-bottom: 8px; }
.barra { background: #333848; border-radius: 6px; height: 10px; overflow: hidden; margin: 6px 0; }
.barra > div { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.meta-item .prog { font-size: .8rem; font-weight: 600; }

.plano { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
.dia-plano { background: var(--card2); border-radius: 10px; padding: 12px; border-top: 3px solid var(--border); }
.dia-plano.forte { border-top-color: var(--accent); }
.dia-plano .dia { font-weight: 700; font-size: .85rem; }
.dia-plano .sug { font-size: .78rem; color: var(--muted); margin-top: 6px; line-height: 1.45; }
.plano-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.btn-agendar { display: inline-block; background: #1877f2; color: #fff; font-weight: 700; font-size: .82rem;
  padding: 9px 14px; border-radius: 9px; text-decoration: none; white-space: nowrap; }
.btn-agendar:hover { filter: brightness(1.12); }
.legendas { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; margin-top: 10px; }
.legenda-card { background: var(--card2); border-radius: 10px; padding: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; }
.legenda-card .lc-titulo { font-weight: 700; font-size: .82rem; margin-bottom: 8px; }
.legenda-card pre { font-family: inherit; font-size: .78rem; color: var(--muted); white-space: pre-wrap; line-height: 1.5; flex: 1; margin: 0 0 10px; }
.btn-copiar { align-self: flex-start; background: transparent; border: 1px solid var(--accent); color: var(--accent);
  font-size: .75rem; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
.btn-copiar:hover { background: var(--accent); color: #fff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: .7rem; font-weight: 700; margin-top: 6px; }
.badge.reels { background: rgba(225,48,108,.2); color: #ff6b9d; }
.badge.feed { background: rgba(52,152,219,.2); color: #6bb9f0; }
.badge.story { background: rgba(241,196,15,.15); color: var(--yellow); }

table { width: 100%; border-collapse: collapse; font-size: .85rem; }
th { text-align: left; color: var(--muted); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: .78rem; }
td { padding: 9px 10px; border-bottom: 1px solid rgba(44,48,64,.5); }
tr:hover td { background: rgba(255,255,255,.02); }
td a { color: var(--accent); text-decoration: none; }
.num { text-align: right; font-variant-numeric: tabular-nums; }

.duas-colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 760px) { .duas-colunas { grid-template-columns: 1fr; } }

.stat-linha { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(44,48,64,.5); font-size: .87rem; }
.stat-linha:last-child { border-bottom: none; }
.stat-linha .v { font-weight: 700; }

.grafico-barras { display: flex; align-items: flex-end; gap: 4px; height: 130px; padding-top: 24px; }
.gb-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; position: relative; }
.gb-barra { width: 100%; max-width: 46px; background: linear-gradient(180deg, var(--accent2), var(--accent)); border-radius: 5px 5px 0 0; min-height: 3px; }
.gb-barra.azul { background: linear-gradient(180deg, #5dade2, var(--blue)); }
.gb-rotulo { font-size: .68rem; color: var(--muted); white-space: nowrap; }
.gb-valor { font-size: .7rem; font-weight: 700; }
.gb-extra { position: absolute; top: -20px; font-size: .66rem; color: var(--yellow); font-weight: 700; }

.tema-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; margin: 4px 4px 4px 0; font-size: .82rem; }
.tema-tag b { color: var(--accent2); }

.comp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.comp-item { background: var(--card2); border-radius: 10px; padding: 14px; text-align: center; }
.comp-item .rotulo { font-size: .76rem; color: var(--muted); }
.comp-item .valores { font-size: 1.05rem; font-weight: 800; margin: 6px 0 2px; }
.comp-item .valores .antes { color: var(--muted); font-weight: 600; font-size: .85rem; }
.comp-item .var { font-size: .8rem; font-weight: 700; }

footer { text-align: center; color: var(--muted); font-size: .75rem; margin-top: 30px; }
.vazio { color: var(--muted); font-size: .85rem; font-style: italic; }
.nota { font-size: .78rem; color: var(--muted); margin-top: 10px; }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>📱 Instagram — Grupo A.M. Gomes</h1>
    <div class="sub">Análise de conteúdo e vendas online · gestão + execução de marketing</div>
    <div class="selo" id="seloColeta">Carregando…</div>
  </div>
</header>

<div class="container">
  <div class="tabs" id="tabs"></div>
  <div id="conteudo"></div>
  <footer id="rodape"></footer>
</div>

<script src="dados.js"></script>
<script>
// ─── Utilidades ───────────────────────────────────────────────────────────────
const DIAS_PT = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
const DIAS_ABREV = ['dom','seg','ter','qua','qui','sex','sáb'];
const MESES_ABREV = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const fmt = n => (n ?? 0).toLocaleString('pt-BR');
const fmtData = iso => new Date(iso).toLocaleDateString('pt-BR');
const pct = (novo, antigo) => antigo > 0 ? ((novo - antigo) / antigo * 100) : null;

const TEMAS = [
  { chave: 'sorteio',      nome: '🎁 Sorteio',            regex: /sorteio|sorteando|concorr[ae]/i },
  { chave: 'promo',        nome: '🏷️ Promoção/Oferta',    regex: /promo[çc][ãa]o|oferta|desconto|off\b|liquid|queima/i },
  { chave: 'novidade',     nome: '✨ Novidade/Chegou',     regex: /chegou|chegaram|novidade|lan[çc]amento|novo[s]?\b|nova[s]?\b/i },
  { chave: 'dica',         nome: '💡 Dica/Tutorial',       regex: /dica|como usar|passo a passo|tutorial|aprenda|sabia que/i },
  { chave: 'data',         nome: '📅 Data comemorativa',   regex: /m[ãa]es|namorados|natal|p[áa]scoa|black|anivers[áa]rio|carnaval|festa/i },
  { chave: 'produto',      nome: '🧴 Produto/Marca',       regex: /shampoo|condicionador|m[áa]scara|creme|perfume|maquiagem|batom|sombra|primer|wella|loreal|kerastase|truss|taiff/i },
  { chave: 'institucional',nome: '🏪 Institucional/Equipe',regex: /equipe|loja|hor[áa]rio|funcionamento|gratid[ãa]o|obrigad|cliente/i },
];
function classificarTema(legenda) {
  for (const t of TEMAS) if (t.regex.test(legenda || '')) return t;
  return { chave: 'outro', nome: '📌 Outros' };
}
// IDs públicos das Páginas FB (abre o Planner do Business Suite da loja certa)
const PAGE_IDS = { L1: '271167596379346', L4: '2152437001676475', L5: '432919069914495' };
const CIDADES = { L1: 'Altamira', L3: 'Itaituba', L4: 'Altamira', L5: 'Santarém' };
// Engajamento ponderado: comentário > salvo > compartilhamento > curtida (intenção crescente)
function engaj(p) {
  return (p.curtidas || 0) + (p.comentarios || 0) * 3 +
         (p.salvos || 0) * 4 + (p.compartilhamentos || 0) * 5;
}

// Estatísticas de uma loja (compartilhado entre Visão Geral e aba da loja)
function calcularStats(loja) {
  const posts = loja.posts || [];
  const agora = new Date();
  const d = n => new Date(agora - n * 864e5);
  const posts30 = posts.filter(p => new Date(p.data) >= d(30));
  const posts90 = posts.filter(p => new Date(p.data) >= d(90));
  const posts90ant = posts.filter(p => { const t = new Date(p.data); return t >= d(180) && t < d(90); });
  const ultimoPost = posts[0];
  const diasSemPostar = ultimoPost ? Math.floor((agora - new Date(ultimoPost.data)) / 864e5) : null;
  const baseEng = posts90.length >= 3 ? posts90 : posts.slice(0, 10);
  const engMedio = baseEng.length ? baseEng.reduce((s,p) => s + p.curtidas + p.comentarios, 0) / baseEng.length : 0;
  const engRate = loja.perfil?.seguidores ? (engMedio / loja.perfil.seguidores * 100) : 0;
  const media = arr => arr.length ? arr.reduce((s,p) => s + p.curtidas + p.comentarios, 0) / arr.length : 0;
  return { posts, posts30, posts90, posts90ant, ultimoPost, diasSemPostar, engRate,
           mediaEng90: media(posts90), mediaEng90ant: media(posts90ant) };
}

// ─── Visão Geral (gestão) ────────────────────────────────────────────────────
function renderVisaoGeral(lojas) {
  const el = document.getElementById('conteudo');
  const conectadas = lojas.filter(l => l.conectada);
  const pendentes = lojas.filter(l => !l.conectada);

  let html = '';

  // Alertas consolidados
  const alertas = [];
  for (const l of conectadas) {
    const s = calcularStats(l);
    if (s.diasSemPostar > 14) alertas.push(['vermelho', `🚨 <b>${l.codigo}</b>: ${s.diasSemPostar} dias sem publicar (último post ${fmtData(s.ultimoPost.data)})`]);
    if (l.dms?.naoLidas > 0) alertas.push(['vermelho', `📬 <b>${l.codigo}</b>: ${l.dms.naoLidas} DM(s) não lida(s)`]);
    const varEng = pct(s.mediaEng90, s.mediaEng90ant);
    if (varEng !== null && varEng < -25 && s.posts90.length >= 3)
      alertas.push(['amarelo', `📉 <b>${l.codigo}</b>: engajamento caiu ${Math.abs(varEng).toFixed(0)}% vs trimestre anterior`]);
  }
  if (pendentes.length) alertas.push(['amarelo', `🔌 ${pendentes.length} loja(s) ainda sem conexão à API: ${pendentes.map(l => l.codigo).join(', ')} — comparação entre lojas fica completa quando conectarem`]);
  if (alertas.length) html += '<div class="alertas">' + alertas.map(([c,t]) => `<div class="alerta ${c}">${t}</div>`).join('') + '</div>';

  // Tabela comparativa
  html += `<section><h2>🏪 Comparação entre lojas</h2><div class="card">
    <table><thead><tr><th>Loja</th><th>Conta</th><th class="num">Seguidores</th><th class="num">Posts 30d</th><th class="num">Engaj. médio</th><th class="num">Dias sem postar</th><th class="num">DMs não lidas</th></tr></thead><tbody>`;
  for (const l of lojas) {
    if (!l.conectada) {
      html += `<tr style="opacity:.5"><td><b>${l.codigo}</b> ${l.nome}</td><td colspan="6" class="vazio">não conectada — pedir ao Claude: "conectar Instagram da ${l.codigo}"</td></tr>`;
      continue;
    }
    const s = calcularStats(l);
    const corDias = s.diasSemPostar <= 3 ? 'var(--green)' : s.diasSemPostar <= 7 ? 'var(--yellow)' : 'var(--red)';
    html += `<tr>
      <td><b>${l.codigo}</b> ${l.nome}</td>
      <td>@${l.perfil.username}</td>
      <td class="num"><b>${fmt(l.perfil.seguidores)}</b></td>
      <td class="num">${s.posts30.length}</td>
      <td class="num">${s.engRate.toFixed(2)}%</td>
      <td class="num" style="color:${corDias};font-weight:700">${s.diasSemPostar ?? '—'}</td>
      <td class="num">${l.dms?.naoLidas ?? 0}</td>
    </tr>`;
  }
  html += `</tbody></table>
    <p class="nota">Engajamento médio = (curtidas + comentários por post dos últimos 90 dias) ÷ seguidores. Referência do varejo: 1–3% é saudável.</p>
  </div></section>`;

  // Tendência consolidada por loja (12 meses, posts/mês)
  html += `<section><h2>📈 Ritmo de publicação — últimos 12 meses</h2>`;
  for (const l of conectadas) {
    const meses = tendenciaMensal(l.posts || []);
    const maxN = Math.max(...meses.map(m => m.n), 1);
    html += `<div class="card" style="margin-bottom:12px"><h3 class="sub">${l.codigo} · @${l.perfil.username} — barras: posts/mês · número amarelo: média de curtidas</h3>
      <div class="grafico-barras">${meses.map(m => `
        <div class="gb-col">
          ${m.n > 0 ? `<div class="gb-extra">${m.mediaCur.toFixed(0)}❤</div>` : ''}
          <div class="gb-valor">${m.n}</div>
          <div class="gb-barra" style="height:${m.n/maxN*70}%"></div>
          <div class="gb-rotulo">${m.rotulo}</div>
        </div>`).join('')}
      </div></div>`;
  }
  html += `</section>`;

  el.innerHTML = html;
}

function tendenciaMensal(posts) {
  const agora = new Date();
  const meses = [];
  for (let i = 11; i >= 0; i--) {
    const ref = new Date(agora.getFullYear(), agora.getMonth() - i, 1);
    const chave = ref.getFullYear() + '-' + String(ref.getMonth() + 1).padStart(2, '0');
    meses.push({ chave, rotulo: MESES_ABREV[ref.getMonth()] + (ref.getMonth() === 0 ? '/' + String(ref.getFullYear()).slice(2) : ''), n: 0, cur: 0, mediaCur: 0 });
  }
  for (const p of posts) {
    const chave = p.data.slice(0, 7);
    const m = meses.find(x => x.chave === chave);
    if (m) { m.n++; m.cur += p.curtidas; }
  }
  meses.forEach(m => m.mediaCur = m.n ? m.cur / m.n : 0);
  return meses;
}

// ─── Render por loja ──────────────────────────────────────────────────────────
function renderLoja(loja) {
  const el = document.getElementById('conteudo');
  if (!loja.conectada) {
    const pagina = loja.codigo === 'L5' ? ' (Página do Facebook: "Miss Beleza store | Cosméticos | Loja | Beleza")' : '';
    el.innerHTML = `<div class="card"><p class="vazio">🔌 Conta da ${loja.nome}${pagina} ainda não conectada à API. Peça ao Claude: "conectar Instagram da ${loja.codigo}".</p></div>`;
    return;
  }

  const s = calcularStats(loja);
  const posts = s.posts;
  const agora = new Date();
  const d365 = new Date(agora - 365 * 864e5);
  const posts365 = posts.filter(p => new Date(p.data) >= d365);
  const metas = (DADOS_IG.metas?.porLoja || {})[loja.codigo];

  // ── Alertas (com tendência) ──
  const alertas = [];
  if (s.diasSemPostar !== null && s.diasSemPostar > 14)
    alertas.push(['vermelho', `🚨 <b>${s.diasSemPostar} dias sem publicar!</b> Último post em ${fmtData(s.ultimoPost.data)}. Prioridade máxima: retomar presença.`]);
  else if (s.diasSemPostar !== null && s.diasSemPostar > 7)
    alertas.push(['amarelo', `⚠️ ${s.diasSemPostar} dias sem publicar. Programar post para esta semana.`]);
  const varEng = pct(s.mediaEng90, s.mediaEng90ant);
  if (varEng !== null && varEng < -25 && s.posts90.length >= 3)
    alertas.push(['amarelo', `📉 Engajamento médio caiu <b>${Math.abs(varEng).toFixed(0)}%</b> vs trimestre anterior (${s.mediaEng90ant.toFixed(0)} → ${s.mediaEng90.toFixed(0)} interações/post).`]);
  if (varEng !== null && varEng > 25 && s.posts90.length >= 3)
    alertas.push(['verde', `📈 Engajamento médio subiu <b>${varEng.toFixed(0)}%</b> vs trimestre anterior. O que mudou está funcionando — ver seção "O que funcionou".`]);
  if ((loja.stories || []).length === 0)
    alertas.push(['amarelo', `📖 Nenhum story ativo agora. Stories diários mantêm a loja visível sem depender do algoritmo do feed.`]);
  if (loja.dms?.naoLidas > 0)
    alertas.push(['vermelho', `📬 <b>${loja.dms.naoLidas} conversa(s) com DM não lida.</b> Responder rápido melhora alcance e converte venda.`]);
  if (s.engRate >= 1.5)
    alertas.push(['verde', `🌟 Engajamento recente saudável (${s.engRate.toFixed(2)}%). Manter o ritmo.`]);

  // ── Análises ──
  const porDia = Array.from({length:7}, () => ({ n: 0, eng: 0 }));
  posts.forEach(p => { const d = new Date(p.data).getDay(); porDia[d].n++; porDia[d].eng += p.curtidas; });
  const mediaDia = porDia.map(d => d.n ? d.eng / d.n : 0);
  const maxMediaDia = Math.max(...mediaDia);
  const melhoresDias = mediaDia.map((m,i) => ({ i, m })).sort((a,b) => b.m - a.m).slice(0,3).map(x => x.i);

  // Por horário (fuso Belém = UTC-3; timestamps vêm em UTC)
  const FAIXAS = [ {nome:'Madrugada (0–6h)', ini:0, fim:6}, {nome:'Manhã (6–12h)', ini:6, fim:12}, {nome:'Tarde (12–18h)', ini:12, fim:18}, {nome:'Noite (18–24h)', ini:18, fim:24} ];
  const porHora = FAIXAS.map(f => ({ ...f, n: 0, eng: 0 }));
  posts.forEach(p => {
    const h = (new Date(p.data).getUTCHours() - 3 + 24) % 24;
    const fx = porHora.find(f => h >= f.ini && h < f.fim);
    if (fx) { fx.n++; fx.eng += p.curtidas + p.comentarios; }
  });

  const basePeriodo = posts365.length >= 10 ? posts365 : posts.slice(0, 100);
  const porFormato = {};
  basePeriodo.forEach(p => {
    const k = p.produto === 'REELS' ? 'Reels' : 'Feed (foto/carrossel)';
    porFormato[k] = porFormato[k] || { n: 0, cur: 0, com: 0 };
    porFormato[k].n++; porFormato[k].cur += p.curtidas; porFormato[k].com += p.comentarios;
  });

  // Engajamento médio por tema (histórico, temas com ≥5 posts)
  const porTema = {};
  posts.forEach(p => {
    const t = classificarTema(p.legenda).nome;
    porTema[t] = porTema[t] || { n: 0, eng: 0 };
    porTema[t].n++; porTema[t].eng += p.curtidas + p.comentarios;
  });
  const temasRank = Object.entries(porTema)
    .filter(([,v]) => v.n >= 5)
    .map(([nome, v]) => ({ nome, n: v.n, media: v.eng / v.n }))
    .sort((a,b) => b.media - a.media);

  const top12m = [...posts365].sort((a,b) => engaj(b) - engaj(a)).slice(0, 5);
  const topAll = [...posts].sort((a,b) => engaj(b) - engaj(a)).slice(0, 5);
  const temasTop = temasRank.slice(0, 6).map(t => [t.nome, t.n]);
  const plano = gerarPlano(melhoresDias, temasTop, metas);

  const hist = (DADOS_IG.historicoSeguidores || []).filter(h => h.loja === loja.codigo).sort((a,b) => a.data.localeCompare(b.data));
  let deltaSeguidores = null;
  if (hist.length >= 2) deltaSeguidores = hist[hist.length-1].seguidores - hist[0].seguidores;

  const meses = tendenciaMensal(posts);
  const maxN = Math.max(...meses.map(m => m.n), 1);

  // ── HTML ──
  let html = '';
  if (alertas.length) html += '<div class="alertas">' + alertas.map(([c,t]) => `<div class="alerta ${c}">${t}</div>`).join('') + '</div>';

  html += `<div class="kpis">
    <div class="kpi"><div class="valor">${fmt(loja.perfil.seguidores)}</div><div class="rotulo">Seguidores @${loja.perfil.username}</div>
      ${deltaSeguidores !== null ? `<div class="delta ${deltaSeguidores >= 0 ? 'pos' : 'neg'}">${deltaSeguidores >= 0 ? '+' : ''}${deltaSeguidores} desde ${fmtData(hist[0].data)}</div>` : '<div class="delta neutro">acompanhando desde hoje</div>'}</div>
    <div class="kpi"><div class="valor">${s.posts30.length}</div><div class="rotulo">Posts últimos 30 dias</div>
      <div class="delta ${s.posts30.length >= (metas?.postsPorSemana?.meta || 3) * 4 ? 'pos' : 'neg'}">meta: ${(metas?.postsPorSemana?.meta || 3) * 4}/mês</div></div>
    <div class="kpi"><div class="valor">${s.engRate.toFixed(2)}%</div><div class="rotulo">Engajamento médio recente</div>
      <div class="delta ${s.engRate >= (metas?.engajamentoMedio?.metaPct || 1.5) ? 'pos' : 'neg'}">meta: ${metas?.engajamentoMedio?.metaPct || 1.5}%</div></div>
    <div class="kpi"><div class="valor">${s.diasSemPostar ?? '—'}</div><div class="rotulo">Dias desde o último post</div>
      <div class="delta ${s.diasSemPostar <= 3 ? 'pos' : s.diasSemPostar <= 7 ? 'neutro' : 'neg'}">ideal: ≤ 3 dias</div></div>
    <div class="kpi"><div class="valor">${(loja.stories||[]).length}</div><div class="rotulo">Stories ativos agora</div></div>
    <div class="kpi"><div class="valor">${loja.dms?.naoLidas ?? 0}</div><div class="rotulo">DMs não lidas</div>
      <div class="delta ${(loja.dms?.naoLidas ?? 0) === 0 ? 'pos' : 'neg'}">${(loja.dms?.naoLidas ?? 0) === 0 ? 'em dia ✓' : 'responder hoje!'}</div></div>
  </div>`;

  // Tendência 12 meses
  html += `<section><h2>📈 Tendência — últimos 12 meses</h2><div class="card">
    <h3 class="sub">Barras: posts publicados por mês · número amarelo: média de curtidas dos posts do mês</h3>
    <div class="grafico-barras">${meses.map(m => `
      <div class="gb-col">
        ${m.n > 0 ? `<div class="gb-extra">${m.mediaCur.toFixed(0)}❤</div>` : ''}
        <div class="gb-valor">${m.n}</div>
        <div class="gb-barra" style="height:${m.n/maxN*70}%"></div>
        <div class="gb-rotulo">${m.rotulo}</div>
      </div>`).join('')}
    </div>
    <p class="nota">Leitura de gestão: frequência constante alimenta o algoritmo — vales prolongados derrubam o alcance dos posts seguintes.</p>
  </div></section>`;

  // Comparativo de períodos
  const compItens = [
    { rotulo: 'Posts publicados', novo: s.posts90.length, antigo: s.posts90ant.length, fmt: v => v },
    { rotulo: 'Interações médias/post', novo: s.mediaEng90, antigo: s.mediaEng90ant, fmt: v => v.toFixed(1) },
    { rotulo: 'Curtidas totais', novo: s.posts90.reduce((x,p)=>x+p.curtidas,0), antigo: s.posts90ant.reduce((x,p)=>x+p.curtidas,0), fmt: v => fmt(v) },
    { rotulo: 'Comentários totais', novo: s.posts90.reduce((x,p)=>x+p.comentarios,0), antigo: s.posts90ant.reduce((x,p)=>x+p.comentarios,0), fmt: v => fmt(v) },
  ];
  html += `<section><h2>🔁 Últimos 90 dias vs 90 anteriores</h2><div class="card"><div class="comp-grid">
    ${compItens.map(c => {
      const v = pct(c.novo, c.antigo);
      const cor = v === null ? 'neutro' : v >= 0 ? 'pos' : 'neg';
      const seta = v === null ? '' : v >= 0 ? '▲' : '▼';
      return `<div class="comp-item">
        <div class="rotulo">${c.rotulo}</div>
        <div class="valores">${c.fmt(c.novo)} <span class="antes">← ${c.fmt(c.antigo)}</span></div>
        <div class="var delta ${cor}">${v === null ? 'sem base' : seta + ' ' + Math.abs(v).toFixed(0) + '%'}</div>
      </div>`;
    }).join('')}
  </div><p class="nota">Compara o trimestre atual com o anterior — é o termômetro de tendência da conta.</p></div></section>`;

  // Metas
  if (metas) {
    const segAtual = loja.perfil.seguidores;
    const segMeta90 = metas.seguidores.meta90d;
    const segBase = metas.seguidores.baseline;
    const progSeg = Math.min(100, Math.max(0, (segAtual - segBase) / (segMeta90 - segBase) * 100));
    const progPosts = Math.min(100, s.posts30.length / ((metas.postsPorSemana.meta) * 4) * 100);
    const progEng = Math.min(100, s.engRate / metas.engajamentoMedio.metaPct * 100);
    html += `<section><h2>🎯 Metas de crescimento</h2><div class="card"><div class="metas-grid">
      <div class="meta-item"><div class="titulo">Seguidores → ${fmt(segMeta90)} em 90 dias</div>
        <div class="barra"><div style="width:${progSeg}%"></div></div>
        <div class="prog">${fmt(segAtual)} de ${fmt(segMeta90)} (${progSeg.toFixed(0)}%)</div></div>
      <div class="meta-item"><div class="titulo">Frequência → ${metas.postsPorSemana.meta} posts/semana</div>
        <div class="barra"><div style="width:${progPosts}%"></div></div>
        <div class="prog">${s.posts30.length} posts em 30d (${progPosts.toFixed(0)}% da meta mensal)</div></div>
      <div class="meta-item"><div class="titulo">Engajamento → ${metas.engajamentoMedio.metaPct}%</div>
        <div class="barra"><div style="width:${progEng}%"></div></div>
        <div class="prog">${s.engRate.toFixed(2)}% atual (${progEng.toFixed(0)}%)</div></div>
    </div></div></section>`;
  }

  // Plano de postagem
  const pageId = PAGE_IDS[loja.codigo];
  html += `<section><h2>📅 Plano de postagem da semana</h2><div class="card">
    <div class="plano-header">
      <p style="font-size:.83rem;color:var(--muted);margin:0">Gerado a partir do desempenho histórico da conta: melhores dias são <b>${melhoresDias.map(i => DIAS_PT[i]).join(', ')}</b>. Dias com borda rosa = prioridade.</p>
      ${pageId ? `<a class="btn-agendar" href="https://business.facebook.com/latest/planner?asset_id=${pageId}" target="_blank" rel="noopener">🗓️ Agendar no Business Suite</a>` : ''}
    </div>
    <div class="plano">${plano.map(d => `
      <div class="dia-plano ${d.forte ? 'forte' : ''}">
        <div class="dia">${d.dia}</div>
        <div class="sug">${d.sugestao}</div>
        ${d.badges.map(b => `<span class="badge ${b.toLowerCase()}">${b}</span>`).join(' ')}
      </div>`).join('')}
    </div>
    <h3 class="sub" style="margin-top:18px">✍️ LEGENDAS PRONTAS — copiar, trocar os [CAMPOS] e agendar</h3>
    <div class="legendas">${legendasSugeridas(loja, temasTop.map(t => t[0])).map(l => `
      <div class="legenda-card">
        <div class="lc-titulo">${l.titulo}</div>
        <pre>${l.texto}</pre>
        <button class="btn-copiar" onclick="copiarLegenda(this)">📋 Copiar legenda</button>
      </div>`).join('')}
    </div>
    <p class="nota">Fluxo: copiar a legenda → criar a arte no Canva → colar tudo no Planner do Business Suite (botão azul acima) e escolher data/hora. O post sai sozinho no Instagram e no Facebook.</p>
    </div></section>`;

  // O que funcionou
  html += `<section><h2>🏆 O que funcionou nesta conta</h2><div class="duas-colunas">
    <div class="card">
      <h3 class="sub">ENGAJAMENTO MÉDIO POR TEMA (histórico, temas com ≥5 posts)</h3>
      ${temasRank.length ? `<table><thead><tr><th>Tema</th><th class="num">Posts</th><th class="num">Interações médias</th></tr></thead><tbody>
        ${temasRank.map(t => `<tr><td>${t.nome}</td><td class="num">${t.n}</td><td class="num"><b>${t.media.toFixed(1)}</b></td></tr>`).join('')}</tbody></table>` : '<p class="vazio">Dados insuficientes</p>'}
      <h3 class="sub" style="margin-top:16px">DESEMPENHO POR FORMATO (últimos 12 meses)</h3>
      ${Object.entries(porFormato).map(([k,v]) => `<div class="stat-linha"><span>${k} (${v.n} posts)</span><span class="v">${(v.cur/v.n).toFixed(0)} ❤️ · ${(v.com/v.n).toFixed(1)} 💬 por post</span></div>`).join('')}
    </div>
    <div class="card">
      <h3 class="sub">ENGAJAMENTO MÉDIO POR DIA DA SEMANA (histórico)</h3>
      <div class="grafico-barras" style="height:110px">${mediaDia.map((m,i) => `
        <div class="gb-col">
          <div class="gb-valor">${m.toFixed(0)}</div>
          <div class="gb-barra" style="height:${maxMediaDia ? (m/maxMediaDia*72) : 4}%"></div>
          <div class="gb-rotulo">${DIAS_ABREV[i]}</div>
        </div>`).join('')}
      </div>
      <h3 class="sub" style="margin-top:16px">MELHOR HORÁRIO PARA POSTAR (histórico, hora de Belém)</h3>
      ${porHora.filter(f => f.n >= 3).sort((a,b) => b.eng/b.n - a.eng/a.n).map((f,i) => `<div class="stat-linha"><span>${i === 0 ? '🥇 ' : ''}${f.nome} (${f.n} posts)</span><span class="v">${(f.eng/f.n).toFixed(1)} interações/post</span></div>`).join('') || '<p class="vazio">Dados insuficientes</p>'}
    </div>
  </div></section>`;

  // Top posts — com salvos, compartilhamentos e alcance quando disponíveis
  const temInsights = posts.some(p => p.salvos !== null && p.salvos !== undefined);
  const colIns = temInsights ? '<th class="num">🔖</th><th class="num">🔁</th><th class="num">👁️</th>' : '';
  const celIns = p => temInsights
    ? `<td class="num">${p.salvos ?? '—'}</td><td class="num">${p.compartilhamentos ?? '—'}</td><td class="num">${p.alcance !== null && p.alcance !== undefined ? fmt(p.alcance) : '—'}</td>`
    : '';
  const tabelaPosts = lista => `<table><thead><tr><th>Data</th><th>Tema</th><th>Legenda</th><th class="num">❤️</th><th class="num">💬</th>${colIns}<th></th></tr></thead><tbody>
    ${lista.map(p => `<tr>
      <td>${fmtData(p.data)}</td>
      <td>${classificarTema(p.legenda).nome}</td>
      <td>${(p.legenda || '(sem legenda)').replace(/\n/g,' ').slice(0, 45)}${(p.legenda||'').length > 45 ? '…' : ''}</td>
      <td class="num"><b>${fmt(p.curtidas)}</b></td>
      <td class="num">${fmt(p.comentarios)}</td>
      ${celIns(p)}
      <td><a href="${p.link}" target="_blank">ver ↗</a></td>
    </tr>`).join('')}</tbody></table>` +
    (temInsights ? '<p class="nota">🔖 salvos · 🔁 compartilhamentos · 👁️ alcance — o ranking pondera: curtida ×1, comentário ×3, salvo ×4, compartilhamento ×5 (quanto mais intenção, maior o peso).</p>' : '');

  html += `<section><h2>⭐ Top posts</h2><div class="duas-colunas">
    <div class="card"><h3 class="sub">ÚLTIMOS 12 MESES</h3>${top12m.length ? tabelaPosts(top12m) : '<p class="vazio">Nenhum post no período</p>'}</div>
    <div class="card"><h3 class="sub">TODOS OS TEMPOS</h3>${tabelaPosts(topAll)}</div>
  </div></section>`;

  html += `<section><h2>🕓 Últimos posts publicados</h2><div class="card">${posts.length ? tabelaPosts(posts.slice(0, 15)) : '<p class="vazio">Nenhum post</p>'}</div></section>`;

  // Stories — histórico acumulado pela coleta diária (API só expõe stories por 24h)
  const histSt = (DADOS_IG.historicoStories || []).filter(h => h.loja === loja.codigo)
    .sort((a,b) => b.data.localeCompare(a.data));
  html += `<section><h2>📖 Stories — análise do histórico</h2><div class="card">`;
  if (histSt.length === 0) {
    html += `<p class="vazio">Ainda sem stories no histórico. A coleta automática roda 2×/dia (12h e 20h) e vai
      acumulando cada story publicado com alcance, respostas e interações — a análise aparece aqui sozinha.
      <b>Publique stories que a régua começa a medir.</b></p>`;
  } else {
    const comAlcance = histSt.filter(s => s.alcance);
    const mediaAlc = comAlcance.length ? comAlcance.reduce((x,s) => x + s.alcance, 0) / comAlcance.length : 0;
    const totalResp = histSt.reduce((x,s) => x + (s.respostas || 0), 0);
    const porTipoSt = {};
    histSt.forEach(s => { const k = s.tipo === 'VIDEO' ? 'Vídeo' : 'Imagem'; porTipoSt[k] = porTipoSt[k] || {n:0, alc:0, resp:0};
      porTipoSt[k].n++; porTipoSt[k].alc += s.alcance || 0; porTipoSt[k].resp += s.respostas || 0; });
    html += `<div class="kpis" style="margin-bottom:14px">
      <div class="kpi"><div class="valor">${histSt.length}</div><div class="rotulo">Stories registrados</div></div>
      <div class="kpi"><div class="valor">${mediaAlc.toFixed(0)}</div><div class="rotulo">Alcance médio/story</div></div>
      <div class="kpi"><div class="valor">${totalResp}</div><div class="rotulo">Respostas recebidas</div></div>
    </div>
    <h3 class="sub">POR FORMATO</h3>
    ${Object.entries(porTipoSt).map(([k,v]) => `<div class="stat-linha"><span>${k} (${v.n})</span><span class="v">${(v.alc/v.n).toFixed(0)} alcance · ${v.resp} respostas</span></div>`).join('')}
    <h3 class="sub" style="margin-top:14px">ÚLTIMOS STORIES</h3>
    <table><thead><tr><th>Data</th><th>Tipo</th><th class="num">👁️ Alcance</th><th class="num">💬 Respostas</th><th class="num">Interações</th></tr></thead><tbody>
      ${histSt.slice(0, 12).map(s => `<tr><td>${new Date(s.data).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        <td>${s.tipo === 'VIDEO' ? '🎬 Vídeo' : '📷 Imagem'}</td>
        <td class="num">${s.alcance ?? '—'}</td><td class="num">${s.respostas ?? '—'}</td><td class="num">${s.interacoes ?? '—'}</td></tr>`).join('')}
    </tbody></table>`;
  }
  html += `<p class="nota">Coleta 2×/dia (12h/20h) — stories somem da API em 24h, por isso o histórico é acumulado localmente desde 05/07/2026.</p></div></section>`;

  // Concorrentes
  const conc = DADOS_IG.concorrentes;
  const regiao = { L5: 'santarem', L1: 'altamira', L4: 'altamira', L3: 'itaituba' }[loja.codigo];
  const listaConc = conc?.[regiao] || [];
  html += `<section><h2>🔍 Concorrentes na região</h2><div class="card">`;
  if (listaConc.length && listaConc[0].seguidores !== null) {
    html += `<table><thead><tr><th>Perfil</th><th class="num">Seguidores</th><th class="num">Posts/30d</th><th>Formato dominante</th><th>Observações</th></tr></thead><tbody>
      ${listaConc.map(c => `<tr><td><b>${c.perfil}</b></td><td class="num">${fmt(c.seguidores)}</td><td class="num">${c.postsUltimos30d ?? '—'}</td><td>${c.formatoDominante || '—'}</td><td style="font-size:.8rem">${c.observacoes || ''}</td></tr>`).join('')}</tbody></table>
      <p class="nota">Atualizado em ${conc.atualizadoEm} (levantamento manual — Instagram não expõe dados de terceiros via API)</p>`;
  } else {
    html += `<p class="vazio">Primeiro levantamento ainda não realizado. Peça ao Claude: <b>"atualize o monitoramento de concorrentes do dashboard Instagram"</b> — ele pesquisa os perfis da região e preenche esta seção.</p>`;
  }
  html += `</div></section>`;

  el.innerHTML = html;
}

// ─── Gerador do plano semanal ─────────────────────────────────────────────────
function gerarPlano(melhoresDias, temasTop, metas) {
  const postsMeta = metas?.postsPorSemana?.meta || 3;
  const temaNomes = temasTop.map(t => t[0]);
  const sugestoesPost = [
    temaNomes.includes('🎁 Sorteio') ? 'Sorteio ou enquete de produto (conteúdo nº1 da conta!)' : 'Post de produto em destaque com preço/oferta',
    temaNomes.includes('✨ Novidade/Chegou') ? 'Reels "chegou na loja" mostrando novidades da semana' : 'Reels mostrando bastidor ou prateleira',
    temaNomes.includes('💡 Dica/Tutorial') ? 'Dica rápida de uso (cabelo/pele) — gera salvamentos' : 'Antes e depois ou depoimento de cliente',
    'Kit/combo sugerido da semana com CTA "chama no direct"',
  ];
  const plano = [];
  const ordemDias = [1, 2, 3, 4, 5, 6, 0];
  let idxSug = 0;
  for (const d of ordemDias) {
    const forte = melhoresDias.includes(d);
    let sugestao, badges;
    if (forte && idxSug < postsMeta) {
      sugestao = sugestoesPost[idxSug % sugestoesPost.length];
      badges = idxSug % 2 === 0 ? ['Reels', 'Story'] : ['Feed', 'Story'];
      idxSug++;
    } else if (idxSug < postsMeta && (d === 1 || d === 3)) {
      sugestao = sugestoesPost[idxSug % sugestoesPost.length];
      badges = ['Feed', 'Story'];
      idxSug++;
    } else {
      sugestao = 'Stories: bastidores, produto do dia ou repost de cliente';
      badges = ['Story'];
    }
    plano.push({ dia: DIAS_PT[d].charAt(0).toUpperCase() + DIAS_PT[d].slice(1), forte, sugestao, badges });
  }
  return plano;
}

// ─── Legendas prontas por tema (alinhadas às sugestões do plano) ─────────────

  const cidade = CIDADES[loja.codigo] || '';
  const tag = cidade.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const arroba = '@' + loja.perfil.username;
  const cards = [];

  if (temaNomes.includes('🎁 Sorteio')) {
    cards.push({ titulo: '🎁 Sorteio (conteúdo nº1 desta conta)', texto:
`🎁 SORTEIO NO AR! Quer ganhar [PRODUTO]?

Pra participar é fácil:
1️⃣ Siga ${arroba}
2️⃣ Curta este post
3️⃣ Marque 2 amigas nos comentários (quanto mais comentários, mais chances!)

Resultado dia [DATA] aqui nos stories. Boa sorte! 🍀

#sorteio #${tag} #cosmeticos` });
  } else {
    cards.push({ titulo: '🏷️ Produto em oferta', texto:
`🏷️ SÓ ESSA SEMANA: [PRODUTO] por apenas R$ [PREÇO]!

Corre que é por tempo limitado — o estoque tá voando 🏃‍♀️💨

💬 Chama no direct pra reservar o seu
📍 ${loja.nome} · ${cidade}

#promocao #${tag} #beleza` });
  }

  cards.push({ titulo: '✨ Reels "chegou na loja"', texto:
`✨ CHEGOU NA LOJA! 😍

Acabou de desembarcar: [PRODUTO/MARCA]. A gente mal recebeu e já quer levar tudo pra casa 🤭

Vem conferir de pertinho ou chama no direct que a gente separa o seu 💕

📍 ${loja.nome} · ${cidade}
#novidade #${tag} #cosmeticos` });

  cards.push({ titulo: '💡 Dica/Tutorial (gera salvamentos 🔖)', texto:
`💡 DICA DE ESPECIALISTA — salva esse post! 🔖

Você sabia que [DICA — ex.: água muito quente resseca os fios]?

✅ O jeito certo: [PASSO A PASSO CURTO]

Ficou com dúvida? Comenta aqui que a gente responde 👇

#dicadebeleza #${tag}` });

  cards.push({ titulo: '🛍️ Kit/combo da semana', texto:
`🛍️ COMBO DA SEMANA: [PRODUTO 1] + [PRODUTO 2] com preço especial!

A dupla perfeita pra [BENEFÍCIO — ex.: hidratação profunda] 💕

💬 Chama no direct e garanta o seu antes que acabe!
📍 ${loja.nome} · ${cidade}

#combo #${tag} #beleza` });

  return cards;
}

function copiarLegenda(btn) {
  const txt = btn.closest('.legenda-card').querySelector('pre').innerText;
  navigator.clipboard.writeText(txt).then(() => {
    const original = btn.textContent;
    btn.textContent = '✅ Copiada!';
    setTimeout(() => { btn.textContent = original; }, 1800);
  });
}

// ─── Inicialização ────────────────────────────────────────────────────────────
function init() {
  document.getElementById('seloColeta').textContent = '📡 Dados coletados em ' + DADOS_IG.coletadoEmBR;

  const tabs = document.getElementById('tabs');
  const ordem = ['L1', 'L3', 'L4', 'L5'];
  const lojas = ordem.map(c => DADOS_IG.lojas.find(l => l.codigo === c)).filter(Boolean);

  // Aba Visão Geral
  const btnGeral = document.createElement('button');
  btnGeral.className = 'tab ativa';
  btnGeral.textContent = '📊 Visão Geral';
  btnGeral.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativa'));
    btnGeral.classList.add('ativa');
    renderVisaoGeral(lojas);
  };
  tabs.appendChild(btnGeral);

  lojas.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (l.conectada ? '' : ' off');
    btn.textContent = `${l.codigo} · ${l.nome.replace('Casa da Beleza','CB').replace('MissBeleza','MB')}`;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativa'));
      btn.classList.add('ativa');
      renderLoja(l);
    };
    tabs.appendChild(btn);
  });

  renderVisaoGeral(lojas);
